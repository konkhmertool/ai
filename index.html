      <div class="tab-panel active">
        <h1 class="title">Video Prompt Generator</h1>
        <p class="subtitle">Fill the fields and generate a prompt</p>

        <form id="promptForm">
          <div class="form-group">
            <label for="character">Character</label>
            <select id="character" class="form-control">
              <option value="ชายสูงอายุ" selected>ชายสูงอายุ - Elderly man</option>
              <option value="หญิงสูงอายุ">หญิงสูงอายุ - Elderly woman</option>
              <option value="ชายวัยกลางคน">ชายวัยกลางคน - Middle-aged man</option>
              <option value="หญิงวัยกลางคน">หญิงวัยกลางคน - Middle-aged woman</option>
              <option value="ชายหนุ่ม">ชายหนุ่ม - Young man</option>
              <option value="หญิงสาว">หญิงสาว - Young woman</option>
              <option value="เด็กผู้ชายวัยรุ่น">เด็กผู้ชายวัยรุ่น - Teen boy</option>
              <option value="เด็กผู้หญิงวัยรุ่น">เด็กผู้หญิงวัยรุ่น - Teen girl</option>
              <option value="เด็กผู้ชาย">เด็กผู้ชาย - Child boy</option>
              <option value="เด็กผู้หญิง">เด็กผู้หญิง - Child girl</option>
              <option value="ครูผู้หญิง">ครูผู้หญิง - Teacher woman</option>
              <option value="ชาวนาผู้ชาย">ชาวนาผู้ชาย - Farmer man</option>
            </select>
          </div>

          <div class="form-group">
            <label for="appearance">Appearance</label>
            <select id="appearance" class="form-control">
              <option value="ผมสีเทา ริ้วรอยลึก เสื้อเชิ้ตเรียบง่าย" selected>ผมสีเทา ริ้วรอยลึก เสื้อเชิ้ตเรียบง่าย - Grey hair, deep wrinkles, simple shirt</option>
              <option value="ผมสั้นสีดำ แว่นตา ชุดทางการ">ผมสั้นสีดำ แว่นตา ชุดทางการ - Short black hair, glasses, formal attire</option>
              <option value="ผมยาวสีน้ำตาล ชุดลำลอง กระ">ผมยาวสีน้ำตาล ชุดลำลอง กระ - Long brown hair, casual dress, freckles</option>
              <option value="ผมหยิกสีแดง เสื้อแจ็คเก็ตเดนิม รองเท้าผ้าใบ">ผมหยิกสีแดง เสื้อแจ็คเก็ตเดนิม รองเท้าผ้าใบ - Curly red hair, denim jacket, sneakers</option>
              <option value="ศีรษะล้าน เครา เสื้อแจ็คเก็ตหนัง">ศีรษะล้าน เครา เสื้อแจ็คเก็ตหนัง - Bald head, beard, leather jacket</option>
              <option value="ผมหยักศกสีบลอนด์ เสื้อยืด กางเกงยีนส์">ผมหยักศกสีบลอนด์ เสื้อยืด กางเกงยีนส์ - Wavy blonde hair, t-shirt, jeans</option>
              <option value="ผมยาวสีขาว เสื้อคลุมหรูหรา">ผมยาวสีขาว เสื้อคลุมหรูหรา - Long white hair, elegant robe</option>
              <option value="ผมสั้นสีน้ำตาล ผ้าพันคอ เสื้อโค้ทกันหนาว">ผมสั้นสีน้ำตาล ผ้าพันคอ เสื้อโค้ทกันหนาว - Short brown hair, scarf, warm coat</option>
              <option value="ผมสีดำยุ่ง เสื้อฮู้ดดี้ รองเท้าผ้าใบ">ผมสีดำยุ่ง เสื้อฮู้ดดี้ รองเท้าผ้าใบ - Messy black hair, hoodie, sneakers</option>
              <option value="ผมหางม้า เสื้อแจ็คเก็ตสีสด รองเท้าบูท">ผมหางม้า เสื้อแจ็คเก็ตสีสด รองเท้าบูท - Ponytail, bright jacket, boots</option>
              <option value="ผมสีเงิน แว่นตา เสื้อคาร์ดิแกน">ผมสีเงิน แว่นตา เสื้อคาร์ดิแกน - Silver hair, glasses, cardigan</option>
              <option value="ผมยาวระดับไหล่ ผ้ากันเปื้อน ผ้าพันคอสีสันสด">ผมยาวระดับไหล่ ผ้ากันเปื้อน ผ้าพันคอสีสันสด - Shoulder-length hair, apron, colorful scarf</option>
              <option value="ศีรษะโกน แขนมีรอยสัก เสื้อกล้าม">ศีรษะโกน แขนมีรอยสัก เสื้อกล้าม - Shaved head, tattooed arms, tank top</option>
              <option value="ผมหยิกสีเทา ชุดเดรสลายดอกไม้ ต่างหู">ผมหยิกสีเทา ชุดเดรสลายดอกไม้ ต่างหู - Curly grey hair, floral dress, earrings</option>
              <option value="ผมสั้น เสื้อฮู้ดดี้ กระเป๋าเป้">ผมสั้น เสื้อฮู้ดดี้ กระเป๋าเป้ - Short hair, hoodie, backpack</option>
              <option value="ผมยาวสีดำ ชุดพื้นเมือง">ผมยาวสีดำ ชุดพื้นเมือง - Long black hair, traditional clothing</option>
              <option value="เครา เสื้อเชิ้ตลำลอง สายเอี๊ยม">เครา เสื้อเชิ้ตลำลอง สายเอี๊ยม - Beard, casual shirt, suspenders</option>
              <option value="ผมหยิกสีน้ำตาล ชุดกีฬา">ผมหยิกสีน้ำตาล ชุดกีฬา - Curly brown hair, athletic outfit</option>
              <option value="ผมถักเปีย เสื้อคลุมเรียบง่าย">ผมถักเปีย เสื้อคลุมเรียบง่าย - Braided hair, simple tunic</option>
              <option value="ทรงผมโมฮอว์ก เสื้อกั๊กหนัง แหวน">ทรงผมโมฮอว์ก เสื้อกั๊กหนัง แหวน - Mohawk hair, leather vest, rings</option>
            </select>
          </div>

          <div class="form-group">
            <label for="environment">Environment</label>
            <select id="environment" class="form-control">
              <option value="หมู่บ้านทำนาในชนบท">หมู่บ้านทำนาในชนบท - Rural rice farming village</option>
				<option value="ตลาดถนนในกรุงเทพที่พลุกพล่าน">ตลาดถนนในกรุงเทพที่พลุกพล่าน - Busy Bangkok street market</option>
				<option value="วัดเงียบสงบบนภูเขา">วัดเงียบสงบบนภูเขา - Quiet temple mountain hill</option>
				<option value="ชายหาดทรายขาวบนเกาะเขตร้อน">ชายหาดทรายขาวบนเกาะเขตร้อน - Tropical island white beach</option>
				<option value="ตลาดน้ำริมคลอง">ตลาดน้ำริมคลอง - Floating market canal area</option>
				<option value="ป่าดิบหนาทางภาคเหนือ">ป่าดิบหนาทางภาคเหนือ - Dense northern jungle forest</option>
				<option value="หมู่บ้านไม้ริมน้ำแบบดั้งเดิม">หมู่บ้านไม้ริมน้ำแบบดั้งเดิม - Traditional wooden river village</option>
				<option value="ซากวัดโบราณอยุธยา">ซากวัดโบราณอยุธยา - Old Ayutthaya temple ruins</option>
				<option value="ไร่ชาบนภูเขาที่มีหมอก">ไร่ชาบนภูเขาที่มีหมอก - Misty mountain tea plantation</option>
				<option value="ท่าเรือหมู่บ้านชาวประมงเล็ก">ท่าเรือหมู่บ้านชาวประมงเล็ก - Small fishing village harbor</option>
				<option value="ลานวัดเจดีย์ทอง">ลานวัดเจดีย์ทอง - Golden pagoda temple courtyard</option>
				<option value="ถนนดินในชนบทเงียบสงบ">ถนนดินในชนบทเงียบสงบ - Quiet countryside dirt road</option>
				<option value="ทางเดินป่าไผ่บนภูเขา">ทางเดินป่าไผ่บนภูเขา - Bamboo forest mountain trail</option>
				<option value="อ่าวเขาหินปูนริมทะเล">อ่าวเขาหินปูนริมทะเล - Limestone cliffs tropical bay</option>
				<option value="ตลาดกลางคืนริมถนนสีสันสดใส">ตลาดกลางคืนริมถนนสีสันสดใส - Colorful night street market</option>
				<option value="ท่าเรือหมู่บ้านริมแม่น้ำ">ท่าเรือหมู่บ้านริมแม่น้ำ - River boat dock village</option>
				<option value="ชายหาดต้นมะพร้าวริมทะเล">ชายหาดต้นมะพร้าวริมทะเล - Coconut palm beach shore</option>
				<option value="หมู่บ้านชาวเขาบนภูเขา">หมู่บ้านชาวเขาบนภูเขา - Hill tribe mountain village</option>
				<option value="ดาดฟ้าอาคารมองเห็นกรุงเทพ">ดาดฟ้าอาคารมองเห็นกรุงเทพ - Urban rooftop overlooking Bangkok</option>
				<option value="ทุ่งนาควายในชนบท">ทุ่งนาควายในชนบท - Rural buffalo field landscape</option>
            </select>
          </div>

          <div class="form-group">
            <label for="atmosphere">Atmosphere</label>
            <select id="atmosphere" class="form-control">
              <option value="แสงธรรมชาติชัดเจน">แสงธรรมชาติชัดเจน - Clear natural daylight</option>
<option value="แสงกลางวันนุ่มนวล">แสงกลางวันนุ่มนวล - Soft neutral daylight</option>
<option value="เช้าที่สว่างสดใส">เช้าที่สว่างสดใส - Bright clear morning</option>
<option value="แสงธรรมชาติสงบ">แสงธรรมชาติสงบ - Calm natural lighting</option>
<option value="บรรยากาศกลางวันเงียบสงบ">บรรยากาศกลางวันเงียบสงบ - Quiet daytime atmosphere</option>
<option value="แสงธรรมชาติอ่อนโยน">แสงธรรมชาติอ่อนโยน - Gentle natural daylight</option>
<option value="แสงกลางวันสว่างสะอาด">แสงกลางวันสว่างสะอาด - Clean bright daylight</option>
<option value="ท้องฟ้าใสแสงกลางวัน">ท้องฟ้าใสแสงกลางวัน - Clear sky daylight</option>
<option value="แสงกลางวันนุ่มสบาย">แสงกลางวันนุ่มสบาย - Soft daytime lighting</option>
<option value="กลางวันสงบผ่อนคลาย">กลางวันสงบผ่อนคลาย - Calm peaceful daylight</option>
<option value="อากาศเช้าสดชื่น">อากาศเช้าสดชื่น - Fresh morning air</option>

<option value="แสงธรรมชาติเรียบง่าย">แสงธรรมชาติเรียบง่าย - Simple natural daylight</option>
<option value="บรรยากาศกลางวันอ่อนโยน">บรรยากาศกลางวันอ่อนโยน - Mild daylight atmosphere</option>
<option value="เช้าเงียบสงบ">เช้าเงียบสงบ - Still quiet morning</option>
<option value="แสงกลางวันกลางแจ้งใส">แสงกลางวันกลางแจ้งใส - Clear outdoor daylight</option>
<option value="แสงกลางวันเป็นกลาง">แสงกลางวันเป็นกลาง - Neutral daytime lighting</option>
<option value="เช้าใสนุ่มนวล">เช้าใสนุ่มนวล - Soft clear morning</option>
<option value="บรรยากาศแสงธรรมชาติ">บรรยากาศแสงธรรมชาติ - Natural daylight ambience</option>
<option value="กลางวันโปร่งสงบ">กลางวันโปร่งสงบ - Calm open daylight</option>
            </select>
          </div>

          <div class="form-group">
            <label for="objectNear">Object Near Character</label>
            <select id="objectNear" class="form-control">
              <option value="ถ้วยกาแฟร้อน" selected>ถ้วยกาแฟร้อน - Cup of hot coffee</option>
              <option value="หนังสือปกหนังเก่า">หนังสือปกหนังเก่า - Old leather book</option>
              <option value="กระเป๋าเป้">กระเป๋าเป้ - Backpack</option>
              <option value="ไม้เท้า">ไม้เท้า - Walking cane</option>
              <option value="ตะกร้าดอกไม้">ตะกร้าดอกไม้ - Basket of flowers</option>
              <option value="กีตาร์">กีตาร์ - Guitar</option>
              <option value="ร่ม">ร่ม - Umbrella</option>
              <option value="พู่กันและจานสี">พู่กันและจานสี - Paintbrush and palette</option>

              <option value="กล้องถ่ายรูปวินเทจ">กล้องถ่ายรูปวินเทจ - Vintage camera</option>
              <option value="กล้องส่องทางไกล">กล้องส่องทางไกล - Pair of binoculars</option>
              <option value="สุนัขตัวเล็ก">สุนัขตัวเล็ก - Small dog</option>
              <option value="ที่ให้อาหารนก">ที่ให้อาหารนก - Bird feeder</option>
              <option value="แก้วชาร้อน">แก้วชาร้อน - Mug of tea</option>
              <option value="ตะกร้าผลไม้">ตะกร้าผลไม้ - Basket of fruits</option>
              <option value="ลังไม้">ลังไม้ - Wooden crate</option>
              <option value="แล็ปท็อปบนโต๊ะ">แล็ปท็อปบนโต๊ะ - Laptop on a table</option>
              <option value="ขวดน้ำผึ้ง">ขวดน้ำผึ้ง - Jar of honey</option>
              <option value="ผ้าห่ม">ผ้าห่ม - Blanket</option>
              <option value="หนังสือพิมพ์">หนังสือพิมพ์ - Newspaper</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dialogue1">Dialogue Line 1<span class="paste-label" data-target="dialogue1">(📝Paste)</span></label>
            <textarea id="dialogue1" class="form-control"></textarea>
          </div>

          <div class="form-group">
            <label for="dialogue2">Dialogue Line 2<span class="paste-label" data-target="dialogue2">(📝Paste)</span></label>
            <textarea id="dialogue2" class="form-control"></textarea>
          </div>
			<div class="form-group radio-group">
  <label>Video Model</label>

  <div class="radio-row">

      SORA (15 seconds)

    <label class="radio-item">
      <input type="radio" name="video_model" value="2">

  </div>
</div>
          <div class="actions">
            <button type="button" class="btn" id="generateBtn">Generate Prompt</button>
            <button type="button" class="btn" id="copyBtn">Copy Prompt</button>
			<span id="copiedMsg" class="copied-label">Copied.</span>
          </div>

          <div id="outputBox" class="output-box"></div>
        </form>
